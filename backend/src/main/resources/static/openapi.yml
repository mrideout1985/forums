openapi: 3.0.3
info:
  title: Rideout Forums API
  version: 1.0.0
  description: OpenAPI documentation for Rideout Forums API with JWT authentication.
  contact:
    name: Forums Support
    email: support@rideoutforums.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080
    description: Local Development Server
  - url: https://api.rideoutforums.com
    description: Production Server

security:
  - CookieAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register a new user
      description: Create a new user account. JWT is set as an httpOnly cookie.
      operationId: register
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input or user already exists

  /api/auth/login:
    post:
      summary: Login user
      description: Authenticate user. JWT is set as an httpOnly cookie.
      operationId: login
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /api/auth/logout:
    post:
      summary: Logout user
      description: Clear the JWT cookie to end the session
      operationId: logout
      tags:
        - Authentication
      security: []
      responses:
        '204':
          description: Logged out successfully

  /api/auth/me:
    get:
      summary: Get current user
      description: Returns the currently authenticated user's information
      operationId: getCurrentUser
      tags:
        - Authentication
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Not authenticated

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: jwt
      description: >
        JWT authentication via httpOnly cookie set by
        /api/auth/login or /api/auth/register

  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - email
        - password
        - confirmPassword
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          description: Username (3–20 characters)
        email:
          type: string
          format: email
          description: Valid email address
        password:
          type: string
          minLength: 6
          description: Password (minimum 6 characters)
        confirmPassword:
          type: string
          minLength: 6
          description: Password confirmation (must match password)

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          description: Password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT authentication token (present on login/register only)
        username:
          type: string
          description: Username
        email:
          type: string
          description: Email address
        roles:
          type: array
          items:
            type: string
          uniqueItems: true
          description: Set of user roles
