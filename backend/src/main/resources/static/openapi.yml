openapi: 3.0.3
info:
  title: Rideout Forums API
  version: 1.0.0
  description: OpenAPI documentation for Rideout Forums API with JWT authentication.
  contact:
    name: Forums Support
    email: support@rideoutforums.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080
    description: Local Development Server
  - url: https://api.rideoutforums.com
    description: Production Server

security:
  - BearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register a new user
      description: Create a new user account and receive a JWT token
      operationId: register
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input or user already exists

  /api/auth/login:
    post:
      summary: Login user
      description: Authenticate user and receive a JWT token
      operationId: login
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT authentication token. Use the token received from
        /api/auth/login or /api/auth/register

  schemas:
    AuthRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Username (3–50 characters)
        email:
          type: string
          format: email
          description: Valid email address
        password:
          type: string
          minLength: 8
          description: Password (minimum 8 characters)

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username
        password:
          type: string
          description: Password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT authentication token
        username:
          type: string
          description: Username
        email:
          type: string
          description: Email address
        roles:
          type: array
          items:
            type: string
          uniqueItems: true
          description: Set of user roles
